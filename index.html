<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCG LIVE</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: url('fondo.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.7);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .logo {
      width: 200px;
      margin-top: 40px;
    }

    p {
      font-size: 18px;
      margin: 20px 0;
      color: #ccc;
    }

    input {
      margin: 20px;
      color: white;
    }

    button {
      background-color: #00ffcc;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background-color: #00ccaa;
    }

    #preview {
      margin-top: 30px;
      max-width: 90%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,255,200,0.3);
    }
  </style>
</head>

<body>

  <div class="overlay">

    <img src="logo.png" class="logo">

    <p>Subí tu selfie y aparecé en pantalla 🔥</p>

    <input type="file" accept="image/*" capture="user" onchange="mostrarImagen(event)">
    <br>

    <button onclick="alert('')">
      SUBIR SELFIE
    </button>

    <div>
      <img id="preview" src="">
    </div>

  </div>

  <script>
    function mostrarImagen(event) {
      const archivo = event.target.files[0];
      if (archivo) {
        const url = URL.createObjectURL(archivo);
        document.getElementById('preview').src = url;
      }
    }
  </script>

</body>
</html>
