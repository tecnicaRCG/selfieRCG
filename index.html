<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RCG LIVE</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: url('fondo.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background-color: rgba(0, 0, 0, 0.7);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .logo {
      width: 200px;
      margin-top: 40px;
    }

    p {
      font-size: 18px;
      margin: 20px 0;
      color: #ccc;
    }

    input {
      margin: 20px;
      color: white;
    }

    button {
      background-color: #00ffcc;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    button:hover {
      background-color: #00ccaa;
    }

    #preview {
      margin-top: 30px;
      max-width: 90%;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,255,200,0.3);
    }
  </style>
</head>

<body>

  <div class="overlay">

    <img src="logo.png" class="logo">

    <p>Subí tu selfie y aparecé en pantalla 🔥</p>

    <input type="file" accept="image/*" capture="user" onchange="mostrarImagen(event)">
    <br>

   <button
    onclick="subirImagen()">SUBIR SELFIE
  </button>

    <div>
      <img id="preview" src="">
    </div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = 'https://popjngffydbagaebzueq.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvcGpuZ2ZmeWRiYWdhZWJ6dWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTIwNzgsImV4cCI6MjA4OTM4ODA3OH0.-MUNbeTkyO2aviWFW3yI8hfxzN9viKSVnJvmsVEnP-0'; // 

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let archivoGlobal = null;

function mostrarImagen(event) {
  const archivo = event.target.files[0];
  if (archivo) {
    archivoGlobal = archivo;
    document.getElementById('preview').src = URL.createObjectURL(archivo);
  }
}

async function subirImagen() {
  if (!archivoGlobal) {
    alert("Seleccioná una imagen");
    return;
  }

  const nombre = Date.now() + "_" + archivoGlobal.name;

  const { data, error } = await supabaseClient.storage
    .from('selfies')
    .upload(nombre, archivoGlobal);

  if (error) {
    alert("Error al subir");
    console.log(error);
    return;
  }

  const { data: urlData } = supabaseClient.storage
    .from('selfies')
    .getPublicUrl(nombre);

  const url = urlData.publicUrl;

  await supabaseClient.from('fotos').insert([
    { url: url }
  ]);

  alert("🔥 Selfie subida!");
}
</script>

</body>
</html>
